name: '[AU4] Check: Codestyle'

on:
  pull_request:
  workflow_dispatch:

jobs:
  au4_codestyle:
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Test coding style
      run: |
        cmake -P ./muse/buildscripts/ci/checkcodestyle/checkcodestyle.cmake ./src/

    - name: Test QML coding style
      run: |
        cmake -P ./buildscripts/ci/checkcodestyle/check_qml_codestyle.cmake ./src/
