name: '[AU4] Build: Windows'

on:
  pull_request:
    branches:
    - master

  schedule:
    - cron: '0 3 */1 */1 *' # At 03:00 on every day-of-month for master
  #   - cron: '0 5 */1 */1 *' # At 05:00 on every day-of-month for current release branch
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode: devel_build, nightly_build, testing_build, stable_build'
        required: true
        default: 'devel_build'
      sentry_project:
        description: 'Upload symbols and dumps to Sentry (choose a project): au4(default for stable build), au4-sandbox'
        required: false
        default: ''

  workflow_call:
    inputs:
      build_mode:
        description: 'Build mode (devel_build, nightly_build, testing_build, stable_build)'
        type: string
        required: false
        default: 'devel_build'
      app_repo:
        description: 'owner/repo to source Audacity from (default: this repo)'
        type: string
        required: false
        default: ''
      app_ref:
        description: 'Audacity ref to check out (default: ref of triggering event)'
        type: string
        required: false
        default: ''
      framework_repo:
        description: 'owner/repo to source muse_framework from (default: pinned submodule)'
        type: string
        required: false
        default: ''
      framework_ref:
        description: 'Ref to check out into the muse_framework submodule (default: pinned SHA)'
        type: string
        required: false
        default: ''

concurrency:
  group: au4_build_windows-${{ github.ref }}-${{ inputs.framework_ref || '' }}
  cancel-in-progress: true

env:
  CI_DIR: buildscripts/ci

jobs:
  au4_build_windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: windows-2022,   arch: x86_64,  qt_host: windows,       qt_arch: win64_msvc2022_64 }
          - { runner: windows-11-arm, arch: aarch64, qt_host: windows_arm64, qt_arch: win64_msvc2022_arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.app_repo || github.repository }}
        ref: ${{ inputs.app_ref || github.ref }}
        fetch-depth: 3
        submodules: recursive

    - name: Override muse_framework
      if: inputs.framework_ref != '' || github.event_name == 'schedule'
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.framework_repo || 'musescore/muse_framework' }}
        ref: ${{ inputs.framework_ref || 'main' }}
        path: muse
        submodules: recursive

    - name: "Configure workflow"
      shell: bash
      env:
        pull_request_title: ${{ github.event.pull_request.title }}
        SENTRY_SERVER_AU4_KEY: ${{ secrets.SENTRY_SERVER_AU4_KEY }}
        SENTRY_SERVER_AU4_SANDBOX_KEY: ${{ secrets.SENTRY_SERVER_AU4_SANDBOX_KEY }}
        SENTRY_PROJECT: ${{ github.event.inputs.sentry_project }}
      run: |
        ADD_INFO="_${GITHUB_REF#refs/heads/}"
        if [ "${{ github.event_name }}" == "schedule" ] && [ "${{ github.event.schedule }}" == "0 5 */1 */1 *" ]; then ADD_INFO="_${{ env.CURRENT_RELEASE_BRANCH }}"; fi
        if [ "${{ github.event_name }}" == "pull_request" ]; then ADD_INFO="_${{ github.event.pull_request.number }}_${pull_request_title}"; fi

        BUILD_MODE=${{ inputs.build_mode || github.event.inputs.build_mode }}

        cmake -DEVENT=${{ github.event_name }} \
              -DBUILD_MODE=${BUILD_MODE} \
              -DARTIFACT_INFO="Win_${{ matrix.arch }}${ADD_INFO}" \
              -P ${CI_DIR}/common/ci_configure.cmake

        DO_BUILD='true'
        UPLOAD_ARTIFACT_NAME=$(cat ./build.artifacts/env/artifact_name.env)

        DO_UPLOAD_SYMBOLS='false'
        SENTRY_URL=""

        if [ "$SENTRY_SERVER_AU4_KEY" != "" ]; then
          if [ -z "$SENTRY_PROJECT" ] && [ "$BUILD_MODE" == "stable_build" ]; then
            SENTRY_PROJECT="au4"
          fi

          if [ "$SENTRY_PROJECT" == "au4" ]; then
            DO_UPLOAD_SYMBOLS='true'
            SENTRY_URL=https://sentry.audacityteam.org/api/4/minidump/?sentry_key=$SENTRY_SERVER_AU4_KEY
          fi
        fi

        if [ -z "$SENTRY_PROJECT" ] && [ "$BUILD_MODE" == "nightly_build" ]; then
          SENTRY_PROJECT="au4-sandbox"
        fi

        if [ "$SENTRY_PROJECT" == "au4-sandbox" ] && [ "$SENTRY_SERVER_AU4_SANDBOX_KEY" != "" ]; then
          DO_UPLOAD_SYMBOLS='true'
          SENTRY_URL=https://sentry.audacityteam.org/api/5/minidump/?sentry_key=$SENTRY_SERVER_AU4_SANDBOX_KEY
        fi

        # Skip crash reporting and symbols for WoA
        if [ "${{ matrix.arch }}" == "aarch64" ]; then
          DO_UPLOAD_SYMBOLS='false'
          SENTRY_URL=""
        fi

        echo "DO_BUILD=$DO_BUILD" >> $GITHUB_ENV
        echo "DO_BUILD: $DO_BUILD"
        echo "UPLOAD_ARTIFACT_NAME=$UPLOAD_ARTIFACT_NAME" >> $GITHUB_ENV
        echo "UPLOAD_ARTIFACT_NAME: $UPLOAD_ARTIFACT_NAME"

        echo "DO_UPLOAD_SYMBOLS=$DO_UPLOAD_SYMBOLS" >> $GITHUB_ENV
        echo "DO_UPLOAD_SYMBOLS: $DO_UPLOAD_SYMBOLS"
        echo "SENTRY_PROJECT=$SENTRY_PROJECT" >> $GITHUB_ENV
        echo "SENTRY_PROJECT: $SENTRY_PROJECT"
        echo "SENTRY_URL=$SENTRY_URL" >> $GITHUB_ENV
        echo "SENTRY_URL: $SENTRY_URL"

    - name: Restore ccache files
      id: restore-ccache
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{runner.os}}-${{runner.arch}}-ccache-
        restore-keys: ${{runner.os}}-${{runner.arch}}-ccache-
    - name: Setup ccache
      run: |
        choco install -y ccache
        bash ./buildscripts/ci/tools/setup_ccache_config.sh

    - name: Install WiX 3 (WoA)
      if: matrix.runner == 'windows-11-arm' && env.DO_BUILD == 'true'
      shell: pwsh
      run: |
        $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
        $dst = "$env:RUNNER_TEMP\wix3"
        New-Item -ItemType Directory -Force $dst | Out-Null
        Invoke-WebRequest -Uri $url -OutFile "$dst\wix.zip"
        Expand-Archive -Path "$dst\wix.zip" -DestinationPath $dst -Force
        "WIX=$dst" | Out-File $env:GITHUB_ENV  -Append -Encoding utf8
        $dst       | Out-File $env:GITHUB_PATH -Append -Encoding utf8

    - name: Register msvc problem matcher
      run: echo "::add-matcher::.github/problem_matchers/msvc.json"

    - name: Setup x64 Python (WoA)
      if: matrix.runner == 'windows-11-arm'
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        architecture: x64

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        setup-python: ${{ matrix.runner != 'windows-11-arm' }}
        version: '6.10.1'
        host: ${{ matrix.qt_host }}
        target: 'desktop'
        arch: ${{ matrix.qt_arch }}
        modules: 'qt5compat qtnetworkauth qtshadertools qtwebsockets qtgraphs qtquick3d'
        cache: true

    - name: Setup environment
      if: env.DO_BUILD == 'true'
      shell: bash
      run: |
        cmake -P ${CI_DIR}/windows/setup.cmake

    - name: Build
      if: env.DO_BUILD == 'true'
      shell: bash
      run: |
        C_URL=${SENTRY_URL}; if [ -z "$C_URL" ]; then C_URL="''"; fi
        source /c/build_tools/environment.sh
        cmake -DCRASH_REPORT_URL=$C_URL -P ${CI_DIR}/windows/ci_build.cmake

    - name: Show ccache stats
      run: |
        ccache -sv

    - name: Upload build for self-test
      if: env.DO_BUILD == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: selftest-build-windows-${{ matrix.arch }}
        path: ./build.install/
        retention-days: 1

    - name: Package
      env:
        SIGN_KEY:    ${{ secrets.WINDOWS_CODE_SIGNING_ACCESS_KEY_ID }}
        SIGN_SECRET: ${{ secrets.WINDOWS_CODE_SIGNING_SECRET_ACCESS_KEY }}
        WIN_MSI_TESTING_AU4_GUID: ${{ secrets.WIN_MSI_TESTING_AU4_GUID }}
        WIN_MSI_STABLE_AU4_GUID: ${{ secrets.WIN_MSI_STABLE_AU4_GUID }}
      if: env.DO_BUILD == 'true'
      shell: bash
      run: |
        cmake -DPACKARCH=${{ matrix.arch }} -P ${CI_DIR}/windows/package.cmake

    - name: Generate and upload dump symbols
      if: env.DO_UPLOAD_SYMBOLS == 'true'
      shell: bash
      run: |
        APP_BIN=$(pwd)/build.release/Audacity4.pdb

        cmake -DAPP_BIN=${APP_BIN} \
              -DSENTRY_URL=https://sentry.audacityteam.org \
              -DSENTRY_ORG=sentry \
              -DSENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
              -DSENTRY_PROJECT=${SENTRY_PROJECT} \
              -P muse/buildscripts/ci/crashdumps/ci_generate_and_upload.cmake

    - name: Upload artifacts on GitHub
      if: env.DO_BUILD == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.UPLOAD_ARTIFACT_NAME }}
        path: ./build.artifacts/

    - name: Prepare ccache files for saving
      id: prepare-save-ccache
      if: always()
      shell: bash
      run: |
        ccache --recompress 10
        echo "CCACHE_TIMESTAMP=$(date -u +"%F-%T")" | tee -a $GITHUB_OUTPUT
    - name: Save ccache files
      if: always()
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.restore-ccache.outputs.cache-primary-key }}${{ steps.prepare-save-ccache.outputs.CCACHE_TIMESTAMP }}
        path: ${{ github.workspace }}/.ccache

  plugin-registration-self-test:
    needs: au4_build_windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: windows-2022,   arch: x86_64,  qt_host: windows,       qt_arch: win64_msvc2022_64 }
          - { runner: windows-11-arm, arch: aarch64, qt_host: windows_arm64, qt_arch: win64_msvc2022_arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Setup x64 Python (WoA)
      if: matrix.runner == 'windows-11-arm'
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        architecture: x64

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        setup-python: ${{ matrix.runner != 'windows-11-arm' }}
        version: '6.10.1'
        host: ${{ matrix.qt_host }}
        target: 'desktop'
        arch: ${{ matrix.qt_arch }}
        modules: 'qt5compat qtnetworkauth qtshadertools qtwebsockets qtgraphs qtquick3d'
        cache: true

    - name: Download build artifact
      uses: actions/download-artifact@v6
      with:
        name: selftest-build-windows-${{ matrix.arch }}
        path: ./build.install

    - name: Run plugin registration app self-test
      shell: bash
      run: |
        ./build.install/bin/Audacity4.exe --plugin-registration-self-test

    - name: Delete self-test artifact
      if: always()
      uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
      with:
        failOnError: false
        name: selftest-build-windows-${{ matrix.arch }}
